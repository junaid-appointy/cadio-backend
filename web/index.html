<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Forma</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { color-scheme: dark;
    --bg:#14161a; --panel:#101215; --line:#2a2e35; --fg:#d8dbe0; --dim:#6b7280;
    --gold:#e8b34b; --ok:#7dcf85; --err:#e06c75; }
  * { box-sizing: border-box; }
  body { margin:0; height:100vh; display:grid; grid-template-columns: 360px 1fr 320px;
         font:13.5px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
         background:var(--bg); color:var(--fg); }
  h1 { font-size:15px; margin:0; color:var(--gold); }
  button { background:var(--gold); color:var(--bg); border:0; border-radius:5px;
           padding:6px 14px; font-weight:700; cursor:pointer; font-family:inherit; }
  button:disabled { opacity:.45; cursor:wait; }
  button.ghost { background:transparent; color:var(--gold); border:1px solid #3a3325; }
  input, textarea { background:var(--panel); color:var(--fg); border:1px solid var(--line);
                    border-radius:4px; padding:6px 8px; font:12.5px/1.5 inherit; outline:none; }
  .dim { color:var(--dim); } .ok { color:var(--ok); } .err { color:var(--err); }

  /* ---- chat ---- */
  #chat { display:flex; flex-direction:column; border-right:1px solid var(--line); min-width:0; }
  #chat header { padding:10px 14px; border-bottom:1px solid var(--line);
                 display:flex; align-items:center; gap:8px; }
  #connDot { width:8px; height:8px; border-radius:50%; background:var(--err); flex:none; }
  #connDot.on { background:var(--ok); }
  #modelBox { padding:8px 12px; border-bottom:1px solid var(--line); display:flex; gap:6px; }
  #model { flex:1; min-width:0; }
  #msgs { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:95%; white-space:pre-wrap; word-break:break-word; border-radius:8px;
         padding:8px 11px; font-size:13px; }
  .msg.user { align-self:flex-end; background:#26303e; }
  .msg.agent { align-self:flex-start; background:#1b1e24; border:1px solid var(--line); }
  .msg.sys { align-self:center; color:var(--dim); font-size:12px; background:none; padding:2px; }
  .msg.error { align-self:center; color:var(--err); font-size:12px; }
  .runcard { align-self:flex-start; border:1px solid var(--line); border-left:3px solid var(--gold);
             border-radius:6px; padding:7px 10px; font-size:12px; cursor:pointer; background:#1b1e24; }
  .askform { align-self:flex-start; border:1px solid #3a4a3a; border-radius:8px;
             padding:10px; background:#171c17; width:95%; }
  .askform label { display:block; font-size:12px; color:var(--dim); margin:8px 0 3px; }
  .askform input { width:100%; }
  .askform button { margin-top:10px; }
  #composer { display:flex; gap:8px; padding:10px 12px; border-top:1px solid var(--line); }
  #inputText { flex:1; resize:none; height:60px; }

  /* ---- viewer ---- */
  #viewer { position:relative; min-width:0; }
  #canvas { width:100%; height:100%; display:block; }
  #exports { position:absolute; top:10px; right:12px; display:flex; gap:8px; }
  #exports a { color:var(--gold); text-decoration:none; font-size:12px; border:1px solid #3a3325;
               padding:4px 10px; border-radius:4px; background:#14161acc; }
  #vstrip { position:absolute; left:12px; bottom:10px; right:12px; font-size:12px;
            background:#14161add; border:1px solid var(--line); border-radius:6px;
            padding:6px 10px; white-space:pre-wrap; display:none; }

  /* ---- right panel ---- */
  #side { border-left:1px solid var(--line); display:flex; flex-direction:column; min-width:0; }
  #tabs { display:flex; border-bottom:1px solid var(--line); }
  #tabs div { flex:1; text-align:center; padding:9px 0; cursor:pointer; color:var(--dim);
              border-bottom:2px solid transparent; font-size:12.5px; }
  #tabs div.active { color:var(--fg); border-bottom-color:var(--gold); }
  .pane { flex:1; overflow-y:auto; padding:12px; display:none; }
  .pane.active { display:flex; flex-direction:column; gap:8px; }
  .pgroup { color:var(--gold); font-size:11px; margin-top:6px; text-transform:uppercase; letter-spacing:.06em; }
  .prow label { display:block; font-size:12px; color:var(--dim); }
  .prow { display:flex; flex-direction:column; gap:2px; }
  .prow .ctl { display:flex; gap:8px; align-items:center; }
  .prow input[type=range] { flex:1; }
  .prow input[type=number] { width:82px; }
  #codeArea { flex:1; min-height:300px; resize:none; font-size:12px; }
  .runrow { border:1px solid var(--line); border-radius:6px; padding:7px 9px; cursor:pointer; font-size:12px; }
  .runrow:hover { border-color:var(--gold); }
</style>
</head>
<body>

<section id="chat">
  <header><span id="connDot"></span><h1>forma</h1><span class="dim" style="font-size:12px">precision engine · v0</span></header>
  <div id="modelBox">
    <input id="model" title="LLM (LiteLLM format: provider/model-id)" />
    <button class="ghost" id="reconnect">connect</button>
  </div>
  <div id="msgs"></div>
  <div id="composer">
    <textarea id="inputText" placeholder="Describe the part you need…"></textarea>
    <button id="sendBtn">Send</button>
  </div>
</section>

<section id="viewer">
  <canvas id="canvas"></canvas>
  <div id="exports"></div>
  <div id="vstrip"></div>
</section>

<section id="side">
  <div id="tabs">
    <div data-pane="params" class="active">Params</div>
    <div data-pane="code">Code</div>
    <div data-pane="runs">Runs</div>
  </div>
  <div id="params" class="pane active"><span class="dim">No model yet — ask the agent, or paste code in the Code tab.</span></div>
  <div id="code" class="pane">
    <textarea id="codeArea" spellcheck="false" placeholder="# precision-engine program (PARAMS + build)"></textarea>
    <button id="runCode">Run code ▸</button>
  </div>
  <div id="runs" class="pane"></div>
</section>

<script type="importmap">
{ "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';

/* ============ 3D viewer ============ */
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x14161a);
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 10000);
camera.up.set(0,0,1); camera.position.set(180,-180,140);
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
scene.add(new THREE.HemisphereLight(0xffffff, 0x333344, 1.1));
const dl = new THREE.DirectionalLight(0xffffff, 1.2); dl.position.set(1,1,2); scene.add(dl);
const grid = new THREE.GridHelper(400, 40, 0x2a2e35, 0x1e2126);
grid.rotation.x = Math.PI/2; scene.add(grid);
let mesh = null;
function resize(){ const el = document.getElementById('viewer');
  renderer.setSize(el.clientWidth, el.clientHeight, false);
  camera.aspect = el.clientWidth/el.clientHeight; camera.updateProjectionMatrix(); }
new ResizeObserver(resize).observe(document.getElementById('viewer')); resize();
(function anim(){ requestAnimationFrame(anim); controls.update(); renderer.render(scene,camera); })();

function showSTL(url){
  new STLLoader().load(url, geo => {
    if (mesh){ scene.remove(mesh); mesh.geometry.dispose(); }
    geo.computeVertexNormals();
    mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color:0xe8b34b, metalness:.1, roughness:.6 }));
    scene.add(mesh);
    geo.computeBoundingSphere();
    const c = geo.boundingSphere.center, r = geo.boundingSphere.radius;
    controls.target.copy(c);
    camera.position.set(c.x + r*1.8, c.y - r*1.8, c.z + r*1.4);
  });
}

/* ============ helpers ============ */
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const msgs = $('msgs');
function addMsg(cls, html){
  const d = document.createElement('div'); d.className = 'msg ' + cls; d.innerHTML = html;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight; return d;
}
let statusEl = null;
function setStatus(text){
  if (statusEl) statusEl.remove(); statusEl = null;
  if (text) statusEl = addMsg('sys', esc(text));
}

/* ============ state ============ */
let currentMeta = null;   // meta of the run shown in viewer/params
let currentCode = null;   // program text for currentMeta

/* ============ render a run everywhere ============ */
async function renderRun(meta, { announce=false } = {}){
  currentMeta = meta;
  currentCode = null;
  const strip = $('vstrip'); strip.style.display = 'block';
  const exps = $('exports'); exps.innerHTML = '';
  if (!meta.ok){
    strip.innerHTML = `<span class="err">EXECUTION FAILED</span>\n<span class="dim">${esc((meta.error||'').slice(-600))}</span>`;
    return;
  }
  const v = meta.validation || { ok:true, issues:[] };
  const size = meta.bbox.size.map(x=>x.toFixed(2)).join(' × ');
  let html = `<span class="${v.ok?'ok':'err'}">validation ${v.ok?'OK':'FAILED'}</span>`
    + `  <span class="dim">· ${size} mm · ${(meta.volume_mm3/1000).toFixed(1)} cm³ ${meta.label?('· '+esc(meta.label)):''}</span>`;
  for (const i of v.issues||[]) html += `\n<span class="err">[${i.severity}] ${i.code}: ${esc(i.message)}</span>`;
  strip.innerHTML = html;
  for (const kind of ['stl','step','glb']){
    const url = (meta.artifact_urls||{})[kind];
    if (!url) continue;
    const a = document.createElement('a'); a.href = url; a.download=''; a.textContent = kind.toUpperCase();
    exps.appendChild(a);
  }
  if (meta.artifact_urls?.stl) showSTL(meta.artifact_urls.stl);
  buildParamsPanel(meta);
  if (meta.program_url){
    try { currentCode = await (await fetch(meta.program_url)).text();
          $('codeArea').value = currentCode; } catch {}
  }
  if (announce){
    const card = addMsg('runcard',
      `▣ ${esc(meta.label || meta.run_id)} — <span class="${v.ok?'ok':'err'}">${v.ok?'valid':'invalid'}</span> <span class="dim">${size} mm</span>`);
    card.onclick = () => renderRun(meta);
  }
}

/* ============ params panel (manifest-driven, no LLM) ============ */
function buildParamsPanel(meta){
  const pane = $('params'); pane.innerHTML = '';
  const manifest = meta.manifest || [];
  if (!manifest.length){ pane.innerHTML = '<span class="dim">This run declares no parameters.</span>'; return; }
  const values = {...meta.params};
  let group = null;
  for (const spec of manifest){
    if (spec.group !== group){ group = spec.group;
      const g = document.createElement('div'); g.className='pgroup'; g.textContent = group; pane.appendChild(g); }
    const row = document.createElement('div'); row.className='prow';
    const lab = document.createElement('label');
    lab.textContent = `${spec.name}${spec.unit?` (${spec.unit})`:''} — ${spec.description||''}`;
    row.appendChild(lab);
    const ctl = document.createElement('div'); ctl.className='ctl';
    const num = document.createElement('input'); num.type='number'; num.value = values[spec.name];
    if (spec.min!=null) num.min = spec.min; if (spec.max!=null) num.max = spec.max;
    num.step = 'any';
    let range = null;
    if (spec.min!=null && spec.max!=null){
      range = document.createElement('input'); range.type='range';
      range.min=spec.min; range.max=spec.max; range.step=(spec.max-spec.min)/200; range.value=values[spec.name];
      range.oninput = () => { num.value = range.value; values[spec.name] = parseFloat(range.value); };
      ctl.appendChild(range);
    }
    num.oninput = () => { values[spec.name] = parseFloat(num.value); if (range) range.value = num.value; };
    ctl.appendChild(num); row.appendChild(ctl); pane.appendChild(row);
  }
  const apply = document.createElement('button'); apply.textContent = 'Rebuild with these values ▸';
  apply.style.marginTop = '10px';
  apply.onclick = async () => {
    if (!currentCode){ alert('program source unavailable for this run'); return; }
    apply.disabled = true;
    try { await executeCode(currentCode, values, 'manual tweak'); }
    finally { apply.disabled = false; }
  };
  pane.appendChild(apply);
}

/* ============ direct execution (params Apply + Code tab) ============ */
async function executeCode(code, params, label){
  $('vstrip').style.display='block'; $('vstrip').innerHTML = '<span class="dim">building…</span>';
  const res = await fetch('/api/execute', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ code, params, label }),
  });
  const meta = await res.json();
  await renderRun(meta);
  refreshRuns();
  return meta;
}
$('runCode').onclick = () => executeCode($('codeArea').value, null, 'code edit');

/* ============ runs history ============ */
async function refreshRuns(){
  const pane = $('runs');
  const runs = await (await fetch('/api/runs')).json();
  pane.innerHTML = runs.length ? '' : '<span class="dim">No runs yet.</span>';
  for (const r of runs){
    const d = document.createElement('div'); d.className='runrow';
    const size = r.ok && r.bbox ? r.bbox.size.map(x=>x.toFixed(0)).join('×')+'mm' : '';
    d.innerHTML = `<span class="${r.ok && r.validation?.ok ?'ok':'err'}">●</span> ${esc(r.label||r.run_id)} <span class="dim">${size} ${esc(r.created_at||'')}</span>`;
    d.onclick = () => renderRun(r);
    pane.appendChild(d);
  }
}

/* ============ tabs ============ */
for (const t of document.querySelectorAll('#tabs div')){
  t.onclick = () => {
    document.querySelectorAll('#tabs div').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); $(t.dataset.pane).classList.add('active');
    if (t.dataset.pane === 'runs') refreshRuns();
  };
}

/* ============ websocket chat ============ */
let ws = null;
function connect(){
  if (ws) { try { ws.close(); } catch {} }
  const model = $('model').value.trim();
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/chat?model=${encodeURIComponent(model)}`);
  ws.onopen = () => { $('connDot').classList.add('on'); addMsg('sys', `connected · ${esc(model)}`); };
  ws.onclose = () => { $('connDot').classList.remove('on'); setStatus(null); addMsg('sys', 'disconnected'); };
  ws.onmessage = ev => {
    const m = JSON.parse(ev.data);
    if (m.type === 'status'){
      if (m.state === 'thinking') setStatus('thinking…');
      else if (m.state === 'running_cad') setStatus(`building model${m.label?` — ${m.label}`:''}…`);
      else setStatus(null);
    } else if (m.type === 'assistant'){
      setStatus(null); addMsg('agent', esc(m.text));
    } else if (m.type === 'error'){
      setStatus(null); addMsg('error', esc(m.message));
    } else if (m.type === 'run'){
      renderRun(m.meta, { announce:true });
    } else if (m.type === 'ask_user'){
      setStatus(null); renderAskForm(m.questions);
    }
  };
}
$('reconnect').onclick = connect;

function renderAskForm(questions){
  const form = document.createElement('div'); form.className = 'msg askform';
  const inputs = [];
  for (const q of questions){
    const lab = document.createElement('label'); lab.textContent = q.question; form.appendChild(lab);
    const inp = document.createElement('input'); inp.value = q.default || '';
    form.appendChild(inp); inputs.push([q.question, inp]);
  }
  const btn = document.createElement('button'); btn.textContent = 'Answer ▸';
  btn.onclick = () => {
    const answers = inputs.map(([question, inp]) => ({ question, answer: inp.value }));
    ws.send(JSON.stringify({ type:'answers', answers }));
    btn.disabled = true; inputs.forEach(([,i]) => i.disabled = true);
    setStatus('thinking…');
  };
  form.appendChild(btn);
  msgs.appendChild(form); msgs.scrollTop = msgs.scrollHeight;
}

function sendChat(){
  const text = $('inputText').value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  addMsg('user', esc(text));
  ws.send(JSON.stringify({ type:'chat', text }));
  $('inputText').value = '';
}
$('sendBtn').onclick = sendChat;
$('inputText').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendChat(); }
});

/* ============ boot ============ */
(async () => {
  const cfg = await (await fetch('/api/config')).json();
  $('model').value = cfg.default_model;
  const keys = Object.entries(cfg.provider_keys).filter(([,v])=>v).map(([k])=>k);
  addMsg('sys', keys.length ? `server keys: ${keys.join(', ')}` : 'no provider API keys detected on the server');
  const ex = await (await fetch('/api/example')).json();
  $('codeArea').value = ex.code;
  connect();
  refreshRuns();
})();
</script>
</body>
</html>
